name: docker-tmux-tutorial

x-defaults: &defaults
  init: true
  tty: true
  restart: on-failure:2
  networks:
    - tmux_tut_network

volumes:
  db_data:
  redis_data:

networks:
  tmux_tut_network:

services:
  web:
    <<: *defaults
    ports:
      - "5175:5175"
    command: npm run dev
    build:
      args:
        APP: web
      context: .
    volumes:
      - ./apps/web:/usr/src/app
      - /usr/src/app/node_modules
  api:
    <<: *defaults
    ports:
      - "3000:3000"
    command: npm run dev
    build:
      args:
        APP: api
      context: .
    volumes:
      - ./apps/api:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      - db

  db:
    image: postgres:18-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_PORT: 5433
    ports:
      - "5433:5433"
    volumes:
      - db_data:/var/lib/postgresql
      - ./db:/docker-entrypoint-initdb.d

  # Cache Service
  redis:
    image: redis:latest
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
